# Pre-commit hooks for workshop quality
# Install (see CONTRIBUTING.md for details):
#   - With uv: uv tool install pre-commit --with pre-commit-uv && pre-commit install
#   - With pip: pip install pre-commit && pre-commit install
repos:
  # Strip notebook outputs
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
        name: Strip notebook outputs

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: ["--fix"]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["-d", "{extends: default, rules: {line-length: {max: 200}}}"]

  # Python linting (tutor app)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      # Run the linter.
      - id: ruff-check
        args: ["--fix"]
      # Run the formatter.
      - id: ruff-format

  # Trailing whitespace, end-of-file fixer
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        # Need to have quite a large limit here because Model Customization includes 4-5MB files:
        args: ["--maxkb=5000"]
