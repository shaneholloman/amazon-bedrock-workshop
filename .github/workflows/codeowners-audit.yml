name: CODEOWNERS Audit

on:
  schedule:
    - cron: "0 15 1 * *"  # 1st of every month at 3pm UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  audit:
    name: Validate CODEOWNERS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check org membership for CODEOWNERS entries
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CODEOWNERS_FILE=".github/CODEOWNERS"
          REPORT=""
          HAS_ISSUES=false

          if [ ! -f "$CODEOWNERS_FILE" ]; then
            echo "No CODEOWNERS file found."
            exit 0
          fi

          # Extract unique @usernames (not teams)
          USERS=$(grep -oP '@[\w-]+' "$CODEOWNERS_FILE" | sort -u)
          ORG=$(gh repo view --json owner --jq '.owner.login')

          echo "Org: $ORG"
          echo "Checking users: $USERS"
          echo ""

          for USER in $USERS; do
            USERNAME="${USER#@}"

            # Check if user exists on GitHub
            if ! gh api "users/$USERNAME" --silent 2>/dev/null; then
              REPORT="$REPORT\n- **$USER**: Account does not exist on GitHub"
              HAS_ISSUES=true
              continue
            fi

            # Check org membership (will 404 if not a member or token lacks permission)
            HTTP_CODE=$(gh api "orgs/$ORG/members/$USERNAME" \
              --silent -i 2>/dev/null | head -1 | awk '{print $2}')

            if [ "$HTTP_CODE" = "204" ]; then
              echo "✓ $USER is a member of $ORG"
            elif [ "$HTTP_CODE" = "404" ]; then
              REPORT="$REPORT\n- **$USER**: Not a member of $ORG"
              HAS_ISSUES=true
            elif [ "$HTTP_CODE" = "302" ]; then
              echo "? $USER — membership check requires org admin token (skipped)"
            else
              echo "? $USER — could not verify (HTTP $HTTP_CODE)"
            fi
          done

          # Build issue body
          {
            echo "## Monthly CODEOWNERS Audit"
            echo ""
            echo "**File:** \`.github/CODEOWNERS\`"
            echo ""
            echo "### Current owners"
            echo ""
            echo '```'
            cat "$CODEOWNERS_FILE"
            echo '```'
            echo ""
            if [ "$HAS_ISSUES" = true ]; then
              echo "### Issues found"
              echo ""
              echo -e "$REPORT"
              echo ""
            else
              echo "All listed users verified as active."
              echo ""
            fi
            echo "### Action items"
            echo ""
            echo "- [ ] Confirm listed owners are still responsible for these paths"
            echo "- [ ] Add/remove owners as needed for recent team changes"
            echo "- [ ] Verify any new contributors should be added"
          } > audit-report.md

          echo "has_issues=$HAS_ISSUES" >> "$GITHUB_OUTPUT"

      - name: Create or update audit issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Monthly CODEOWNERS audit"
          content-filepath: ./audit-report.md
          labels: automated,maintenance
          update-existing: true
