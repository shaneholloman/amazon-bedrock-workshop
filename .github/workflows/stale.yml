name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had activity in the last 60 days. It will be closed in 30 days if no
            further activity occurs. If this issue is still relevant, please
            comment to keep it open.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            activity in the last 60 days. It will be closed in 30 days if no
            further activity occurs.
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 60
          days-before-pr-close: 30
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,keep-open"
          exempt-pr-labels: "pinned,keep-open"
